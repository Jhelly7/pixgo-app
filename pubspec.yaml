name: pixgo
description: "Pixgo — Stream movies, series, anime and live TV."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.0

  # HTTP
  dio: ^5.4.3+1

  # Local storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0

  # Video playback (HLS via ExoPlayer/AVPlayer)
  video_player: ^2.9.1
  chewie: ^1.8.3

  # Local HTTP server — serve segmentos decriptados ao video_player (proxy local)
  shelf: ^1.4.1

  # Networking utils
  http: ^1.2.1

  # UI
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.5
  qr_flutter: ^4.1.0

  # i18n nativo do Flutter — necessário para MaterialLocalizations
  # (sem isto, TextField pode lançar "No MaterialLocalizations found"
  # e o Flutter desenha um bloco de erro cinzento em vez do widget real)
  flutter_localizations:
    sdk: flutter

  # Icons (Material — já nativo, mas garantindo o pacote completo)
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.20.2
  crypto: ^3.0.3
  pointycastle: ^3.9.1
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/i18n/

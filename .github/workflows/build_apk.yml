      # - name: Create GitHub Release com o APK
      #   uses: softprops/action-gh-release@v2
      #   with:
      #     tag_name: apk-build-${{ github.run_number }}
      #     name: Pixgo APK build #${{ github.run_number }}
      #     files: ${{ steps.apk.outputs.path }}

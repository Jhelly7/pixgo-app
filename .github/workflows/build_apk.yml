name: Build Pixgo APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Tipo de build'
        required: true
        default: 'release'
        type: choice
        options: [ release, debug ]

env:
  FLUTTER_VERSION: '3.24.0'
  # Aponta para a tua API em produção. Podes sobrepor via repo variable
  # (Settings → Secrets and variables → Actions → Variables → API_BASE_URL).
  API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api.pixgo.frii.site' }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze (não bloqueia o build — apenas informativo)
        run: flutter analyze || true

      # ── Assinatura de release (opcional) ─────────────────────────────
      # Se quiseres publicar um APK assinado (para Play Store ou instalação
      # direta sem aviso de "app não verificada"), adiciona estes secrets
      # no repositório: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD,
      # ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD.
      # Sem eles, o build assina automaticamente com a chave de debug —
      # funciona perfeitamente para testes e instalação manual (side-load).
      - name: Decode keystore (se configurado)
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/app/release.keystore
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build APK (release)
        if: ${{ github.event.inputs.build_type != 'debug' }}
        run: flutter build apk --release --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}

      - name: Build APK (debug)
        if: ${{ github.event.inputs.build_type == 'debug' }}
        run: flutter build apk --debug --dart-define=API_BASE_URL=${{ env.API_BASE_URL }}

      - name: Locate APK
        id: apk
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            echo "path=build/app/outputs/flutter-apk/app-debug.apk" >> "$GITHUB_OUTPUT"
          else
            echo "path=build/app/outputs/flutter-apk/app-release.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: pixgo-apk-${{ github.run_number }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      # ── Publicação automática como GitHub Release — DESATIVADA por agora ──
      # Ainda estamos em fase de teste no Android. Quando o app estiver
      # validado e quiseres passar a guardar cada build como Release
      # (útil para partilhar um link fixo de download), descomenta o bloco
      # abaixo. Por agora, o APK fica disponível só no separador "Actions"
      # → clicar na run → "Artifacts" → download.
